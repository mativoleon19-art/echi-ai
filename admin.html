<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECHO — admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1016; --surface:#181d26; --surface-2:#1f2530;
    --accent:#d4a95e; --text:#f0ece2; --muted:#8b93a3; --border:rgba(240,236,226,0.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; display:flex; flex-direction:column; }

  #gate{
    position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:24px; text-align:center;
  }
  #gate h1{ font-family:'Fraunces',serif; font-size:22px; margin:0; }
  #gate p{ color:var(--muted); font-size:13px; margin:0; max-width:280px; }
  #gate input{
    background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; color:var(--text); font-size:16px; width:220px; text-align:center;
    letter-spacing:0.2em; font-family:'IBM Plex Mono',monospace;
  }
  #gate button{
    background:var(--accent); border:none; border-radius:10px; padding:11px 20px;
    font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
  }
  #gate .err{ color:#e8877a; font-size:12px; height:14px; }

  header{ padding:16px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
  header .name{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; }
  header .sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }

  #messages{ flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:10px; }
  .msg{ max-width:80%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.5; }
  .msg.hope{ background:var(--surface); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.hope .tag{ display:block; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--accent); margin-bottom:3px; }
  .msg.me{ background:var(--accent); color:#1a1508; align-self:flex-end; border-bottom-right-radius:4px; }

  #input-bar{ display:flex; gap:10px; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); }
  #input-bar textarea{
    flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:16px;
    padding:11px 14px; color:var(--text); font-size:14.5px; font-family:'Inter',sans-serif;
    outline:none; resize:none; height:44px; max-height:120px;
  }
  #input-bar textarea:focus{ border-color:var(--accent); }
  #input-bar button{
    background:var(--accent); border:none; border-radius:12px; padding:0 18px;
    font-weight:600; cursor:pointer; flex-shrink:0;
  }
</style>
</head>
<body>

<div id="gate">
  <h1>ECHO admin</h1>
  <p>Enter your PIN to see incoming messages and reply as ECHO.</p>
  <input id="pin" type="password" inputmode="numeric" placeholder="••••">
  <div class="err" id="gate-err"></div>
  <button id="gate-btn">Enter</button>
</div>

<header style="display:none" id="head">
  <div class="name">ECHO admin</div>
  <div class="sub">replying as ECHO · Hope sees these live</div>
</header>
<div id="messages" style="display:none"></div>
<div id="input-bar" style="display:none">
  <textarea id="reply-input" placeholder="Type your reply..."></textarea>
  <button id="send-btn">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ---- EDIT THIS: pick your own PIN. This is a soft gate, not real security ----
  const PIN = "2026";
  const CONVO_ID = "hope-lemark"; // must match index.html

  document.getElementById('gate-btn').addEventListener('click', tryEnter);
  document.getElementById('pin').addEventListener('keydown', e => { if(e.key==='Enter') tryEnter(); });

  function tryEnter(){
    const val = document.getElementById('pin').value;
    if(val === PIN){
      document.getElementById('gate').style.display = 'none';
      ['head','messages','input-bar'].forEach(id => document.getElementById(id).style.display = '');
      document.getElementById('messages').style.display = 'flex';
      init();
    } else {
      document.getElementById('gate-err').textContent = 'Wrong PIN';
    }
  }

  function init(){
    const messagesRef = db.ref('conversations/' + CONVO_ID + '/messages');
    const typingRef = db.ref('conversations/' + CONVO_ID + '/adminTyping');
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('reply-input');

    let rendered = new Set();
    messagesRef.on('child_added', snap => {
      if(rendered.has(snap.key)) return;
      rendered.add(snap.key);
      const m = snap.val();
      const div = document.createElement('div');
      div.className = 'msg ' + (m.from === 'hope' ? 'hope' : 'me');
      if(m.from === 'hope'){
        div.innerHTML = '<span class="tag">Hope asked</span>' + escapeHtml(m.text);
      } else {
        div.textContent = m.text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    function send(){
      const text = input.value.trim();
      if(!text) return;
      messagesRef.push({ from: 'echo', text: text, ts: Date.now() });
      input.value = '';
      typingRef.set(false);
    }
    document.getElementById('send-btn').addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
    });

    let typingTimeout;
    input.addEventListener('input', () => {
      typingRef.set(input.value.length > 0);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => typingRef.set(false), 3000);
    });

    function escapeHtml(s){
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  }
</script>
</body>
</html>
