<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ECHO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151c;
    --surface:#1c212b;
    --surface-2:#232936;
    --accent:#d4a95e;
    --text:#f0ece2;
    --muted:#8b93a3;
    --border:rgba(240,236,226,0.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- BOOT SCREEN ---------- */
  #boot{
    position:fixed; inset:0;
    background:var(--bg);
    display:flex; flex-direction:column; justify-content:center;
    padding:32px 28px;
    z-index:10;
  }
  #boot .mark{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500;
    font-size:15px; color:var(--accent); letter-spacing:0.02em;
    margin-bottom:6px;
  }
  #boot h1{
    font-family:'Fraunces',serif; font-weight:600;
    font-size:34px; margin:0 0 28px 0; line-height:1.15;
  }
  #boot-lines{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px; color:var(--muted);
    line-height:2;
    min-height:180px;
  }
  #boot-lines .line{ opacity:0; transform:translateY(4px); transition:opacity .35s, transform .35s; }
  #boot-lines .line.show{ opacity:1; transform:translateY(0); }
  #boot-lines .ok{ color:var(--accent); }
  #boot-bar-wrap{ height:2px; background:var(--border); margin-top:26px; border-radius:2px; overflow:hidden; }
  #boot-bar{ height:100%; width:0%; background:var(--accent); transition:width .25s linear; }
  #boot-skip{
    position:absolute; bottom:28px; right:28px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
    background:none; border:1px solid var(--border); border-radius:20px;
    padding:8px 14px; cursor:pointer;
  }

  /* ---------- CHAT ---------- */
  #chat-screen{ display:none; flex-direction:column; height:100%; }
  header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
    flex-shrink:0;
  }
  .avatar{
    width:38px; height:38px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--accent), #7a5f2f);
    flex-shrink:0;
    position:relative;
  }
  .avatar::after{
    content:''; position:absolute; inset:0; border-radius:50%;
    box-shadow:0 0 0 0 rgba(212,169,94,0.5);
    animation:pulse 2.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(212,169,94,0.35);}
    70%{box-shadow:0 0 0 8px rgba(212,169,94,0);}
    100%{box-shadow:0 0 0 0 rgba(212,169,94,0);}
  }
  header .name{ font-family:'Fraunces',serif; font-weight:600; font-size:17px; }
  header .status{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:1px; }
  header .status .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:#5fbf7a; margin-right:5px; }

  #messages{
    flex:1; overflow-y:auto; padding:20px;
    display:flex; flex-direction:column; gap:12px;
  }
  .msg{ max-width:80%; padding:11px 14px; border-radius:16px; font-size:14.5px; line-height:1.5; }
  .msg.ai{ background:var(--surface); border-bottom-left-radius:4px; align-self:flex-start; }
  .msg.user{ background:var(--accent); color:#1a1508; border-bottom-right-radius:4px; align-self:flex-end; }
  .msg.system{
    align-self:center; color:var(--muted); font-family:'IBM Plex Mono',monospace;
    font-size:11px; background:none; padding:4px;
  }
  #typing{ display:none; align-self:flex-start; padding:11px 16px; background:var(--surface); border-radius:16px; border-bottom-left-radius:4px; }
  #typing span{
    display:inline-block; width:6px; height:6px; margin-right:3px; border-radius:50%;
    background:var(--muted); animation:bounce 1.2s infinite;
  }
  #typing span:nth-child(2){ animation-delay:.15s; }
  #typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-4px);} }

  #input-bar{
    display:flex; gap:10px; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--border); flex-shrink:0;
  }
  #input-bar input{
    flex:1; background:var(--surface-2); border:1px solid var(--border);
    border-radius:22px; padding:12px 16px; color:var(--text); font-size:14.5px;
    font-family:'Inter',sans-serif; outline:none;
  }
  #input-bar input:focus{ border-color:var(--accent); }
  #input-bar button{
    background:var(--accent); border:none; border-radius:50%;
    width:42px; height:42px; flex-shrink:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #input-bar button svg{ width:18px; height:18px; }
</style>
</head>
<body>

<div id="boot">
  <div class="mark">ECHO</div>
  <h1>Getting to know Lemark.</h1>
  <div id="boot-lines"></div>
  <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
  <button id="boot-skip">Skip</button>
</div>

<div id="chat-screen">
  <header>
    <div class="avatar"></div>
    <div>
      <div class="name">ECHO</div>
      <div class="status"><span class="dot"></span>trained on Lemark</div>
    </div>
  </header>
  <div id="messages">
    <div class="msg system">Ask me anything about Lemark — I'll answer as him.</div>
  </div>
  <div id="typing"><span></span><span></span><span></span></div>
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Ask something..." autocomplete="off">
    <button id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1508" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
    </button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ---- EDIT THESE: swap in real facts/quirks about you, one per line ----
  const BOOT_LINES = [
    "Indexing three years of conversations...",
    "Reading up on Kilifi, Pwani, and CPA past papers...",
    "Cross-referencing ETS2 mods and Lana Del Rey playlists...",
    "Calibrating personality — direct, a little dry, always thinking three steps ahead...",
    "Loading everything Hope needs to know...",
  ];

  const CONVO_ID = "hope-lemark"; // shared room key both pages use

  function typeBoot(){
    const wrap = document.getElementById('boot-lines');
    const bar = document.getElementById('boot-bar');
    let i = 0;
    function next(){
      if(i >= BOOT_LINES.length){
        setTimeout(showChat, 500);
        return;
      }
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = BOOT_LINES[i];
      wrap.appendChild(div);
      requestAnimationFrame(()=>div.classList.add('show'));
      bar.style.width = Math.round(((i+1)/BOOT_LINES.length)*100) + '%';
      i++;
      setTimeout(next, 750);
    }
    next();
  }

  function showChat(){
    document.getElementById('boot').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('msg-input').focus();
  }

  document.getElementById('boot-skip').addEventListener('click', showChat);
  typeBoot();

  // ---------- Firebase wiring ----------
  const messagesRef = db.ref('conversations/' + CONVO_ID + '/messages');
  const typingRef = db.ref('conversations/' + CONVO_ID + '/adminTyping');

  const messagesEl = document.getElementById('messages');
  const typingEl = document.getElementById('typing');
  const input = document.getElementById('msg-input');

  function addBubble(text, cls){
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function send(){
    const text = input.value.trim();
    if(!text) return;
    messagesRef.push({ from: 'hope', text: text, ts: Date.now() });
    input.value = '';
  }
  document.getElementById('send-btn').addEventListener('click', send);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') send(); });

  let rendered = new Set();
  messagesRef.on('child_added', snap => {
    if(rendered.has(snap.key)) return;
    rendered.add(snap.key);
    const m = snap.val();
    addBubble(m.text, m.from === 'hope' ? 'user' : 'ai');
  });

  typingRef.on('value', snap => {
    typingEl.style.display = snap.val() ? 'flex' : 'none';
    if(snap.val()) messagesEl.scrollTop = messagesEl.scrollHeight;
  });
</script>
</body>
</html>
